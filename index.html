<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboGoose Level Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="editor-container">
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="right-panel">
        <button id="toggle-panel">▶</button>
        <div class="panel-content">
            <div class="toolbar" id="toolbar"><button class="tool-btn active" data-tool="none" title="Select / Move / Remove"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg></button></div><div style="flex-grow: 1;"></div>
            <div class="bottom-tools" style="display: flex; flex-direction: column; gap: 10px;">
                <button id="settings-btn" class="tool-btn" title="Level Settings">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button id="export-btn" class="tool-btn" title="Export JSON">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="export-modal" class="hidden">
        <div class="modal-content">
            <h3>Exported JSON - Level Data</h3>
            <textarea id="json-output" readonly></textarea>
            <button id="close-modal">Close</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h3>Level Settings</h3>
            <label>Scroll Speed: <input type="number" id="set-scrollSpeed" step="0.1" value="2.4"></label>
            <label>Gravity: <input type="number" id="set-gravity" step="0.1" value="0.4"></label>

            <label>Floor Enabled: <input type="checkbox" id="set-floorEnabled" checked></label>
            <label>Anti-Gravity Mode: <input type="checkbox" id="set-antigravity"></label>
            <label>Y-Tracking Camera: <input type="checkbox" id="set-yTrack"></label>
            <label>Top Gradient Color: <input type="color" id="set-gradientTop" value="#009dff"></label>
            <label>Bottom Gradient Color: <input type="color" id="set-gradientBottom" value="#c2ccff"></label>
            <button id="close-settings-modal">Save</button>
        </div>
    </div>

    <!-- Collapsible Properties Panel -->
    <div id="properties-panel" class="closed">
        <label>Block Color: <input type="color" id="prop-blockColor" value="#ffffff"></label>
    </div>

    <script src="script.js"></script>
</body>
</html>
